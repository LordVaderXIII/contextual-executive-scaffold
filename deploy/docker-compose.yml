# Disposable local/test stack for Cave verification.
# Production Unraid deploy uses external MariaDB (no db service here).
# See deploy/README.md and BUILD_PLAN.md section 10.

services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    stop_grace_period: 30s
    environment:
      MYSQL_ROOT_PASSWORD: ces_root_test_only
      MYSQL_DATABASE: ces
      MYSQL_USER: ces_user
      MYSQL_PASSWORD: ces_test_password
    ports:
      - "3307:3306"
    volumes:
      - ces_test_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  ces-api:
    image: deploy-ces-api:latest
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql+pymysql://ces_user:ces_test_password@db:3306/ces?charset=utf8mb4
      SEED_ON_START: "true"
      CORS_ORIGINS: "http://localhost:3000,http://localhost:8080,http://localhost:8081"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s

  ces-web:
    image: deploy-ces-web:latest
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${CES_WEB_PORT:-8081}:80"
    # service_started avoids Compose recreate races on ces-api; smoke.sh waits for API.
    depends_on:
      ces-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ces-smoke:
    profiles: ["smoke"]
    image: curlimages/curl:8.11.1
    depends_on:
      ces-api:
        condition: service_healthy
    environment:
      API_URL: http://ces-api:8000
      WEB_URL: http://ces-web:80
    volumes:
      - ../scripts/smoke.sh:/smoke.sh:ro
    entrypoint: ["/bin/sh", "/smoke.sh"]

volumes:
  ces_test_db_data:
